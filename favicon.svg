<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="16" fill="#6366f1"/>
  <!-- Network nodes -->
  <circle cx="50" cy="30" r="6" fill="white"/>
  <circle cx="25" cy="60" r="6" fill="white"/>
  <circle cx="75" cy="60" r="6" fill="white"/>
  <circle cx="50" cy="80" r="5" fill="rgba(255,255,255,0.6)"/>
  <!-- Connection lines -->
